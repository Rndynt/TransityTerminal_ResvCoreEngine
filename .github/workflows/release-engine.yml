# Build & publish the reservation-engine Docker image to GitHub Container
# Registry (GHCR).
#
# Triggers:
#   - Push of a tag matching v*.*.* (e.g. v1.0.0) → tagged release.
#   - Manual run from the Actions tab → builds with tag `manual-<short-sha>`.
#
# Outputs (all under ghcr.io/<owner-lowercased>/transity-engine):
#   - <semver>           e.g. v1.0.0
#   - <major>.<minor>    e.g. v1.0
#   - <major>            e.g. v1
#   - latest             only when releasing a non-prerelease semver
#
# The image is pushed under the OWNER of THIS repo. So if this workflow lives
# in github.com/Rndynt/transity-engine, the image is
# ghcr.io/rndynt/transity-engine. The workflow uses the built-in
# ${{ secrets.GITHUB_TOKEN }} — no PAT needed.
#
# By default new GHCR packages are PRIVATE. To let operators on other VPSes
# pull without a PAT, open the package settings on GitHub once and set
# visibility = Public. Otherwise each operator runs `docker login ghcr.io`
# with a read-only PAT (scope: read:packages) before `./deploy.sh`.

name: release-engine

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image owner
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.lc }}/transity-engine
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            type=raw,value=manual-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./engine
          file: ./engine/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
